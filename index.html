<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-6059763208706716">
  <title>leyesophy</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6059763208706716" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --fg: #111;
      --muted: #888;
      --accent: #111;
      --border: #ddd;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 48px 40px 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    header h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    main {
      flex: 1;
      padding: 64px 40px;
      max-width: 640px;
    }

    .tagline {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .desc {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .app-card {
      border: 1px solid var(--border);
      background: #fff;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-card-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .app-card-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .app-card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .app-card-link {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.05em;
      font-weight: 500;
      width: fit-content;
      transition: opacity 0.15s;
    }

    .app-card-link:hover {
      opacity: 0.75;
    }

    footer {
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      header, main, footer { padding-left: 20px; padding-right: 20px; }
      .tagline { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>leyesophy</h1>
  </header>

  <main>
    <p class="tagline">最悪のアドバイスを、<br>真顔でお届けします。</p>
    <p class="desc">AIが生成する、役に立たないアドバイスのWebサービスです。</p>

    <div class="app-card">
      <span class="app-card-label">App</span>
      <span class="app-card-title">クソアドバイザー AI</span>
      <p class="app-card-desc">
        悩みを入力すると、考え得る中で最悪のアドバイスが返ってきます。
        笑えるネタとしてSNSでシェアどうぞ。
      </p>
      <a class="app-card-link" href="https://leyesophy.github.io/kuso-adviser/" target="_blank">
        アドバイスをもらう →
      </a>
    </div>
  </main>

  <footer>
    &copy; 2026 leyesophy
  </footer>
</body>
</html>
